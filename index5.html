<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="index.php" method="POST" enctype="multipart/form-data">

        <label for="username">username:</label>
        <input type="text" id="username" placeholder="nowfalnm" minlength="6" maxlength="15" required>

        <label for="password">password:</label>
        <input type="password" id="password" minlength="6" maxlength="15" required><br>
         
        <label for="email">email:</label>
        <input type="email" id="email" placeholder="ww.holder@gmail.com"><br>

        <label for="phone">phone #:</label>
        <input type="tel" id="phone" placeholder="+91-1234567890" pattern="[0-9]{2}-[0-9]{10}"><br>

        <label for="bday">birthday:</label>
        <input type="date" id="bday"><br>

        <label for="quantity">quantity:</label>
        <input type="number" id="quantity" min="0" max="99"><br>

        <label for="title">title:</label>
         
         <label for="Mr.">Mr.</label>
         <input type="radio" id="mr." value="mr." name="title">
         <label for="Mrs.">Mrs.</label>
         <input type="radio" id="mrs." value="mrs." name="title">
         <label for="phD.">phD.</label>
         <input type="radio" id="phD." value="phD." name="title"><br>

         <label for="payment">payment</label>
         <select>
            <option value="cash">cash</option>
            <option value="card">card</option>
            <option value="gpay">gpay</option>
         </select><br>

         <label for="subscribe">subscribe</label>
         <input type="checkbox" id="subscribe"><br>

         <label for="comments">comments</label>
         <textarea id="comment" rows="3" column="25"></textarea>

         <label for="file">file</label>
         <input type="file" id="file" accept="image/png,image/jpeg"><br>
                    

        <input type="reset"><br>
        <input type="submit">
    </form>
</body>
</html>
